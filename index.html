<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#060817" />
    <meta name="description" content="A private, offline-first personal money dashboard." />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <title>Money Moves</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div><p class="eyebrow">MONEY MOVES</p><h1 id="screenTitle">Dashboard</h1></div>
      </header>

      <section id="dashboard" class="screen active"></section>
      <section id="transactions" class="screen"></section>
      <section id="payday" class="screen"></section>
      <section id="goals" class="screen"></section>
      <section id="settings" class="screen"></section>
    </main>

    <nav class="tabbar" aria-label="Main navigation">
      <button class="tab active" data-screen="dashboard"><svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m3 10 9-7 9 7v10a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1Z"/></svg><span>Home</span></button>
      <button class="tab" data-screen="transactions"><svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h16"/><path d="M7 5h.01M7 12h.01M7 19h.01"/></svg><span>Activity</span></button>
      <button class="tab payday-tab" data-screen="payday"><svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h18v12H3zM3 10h18M7 15h4"/><path d="M8 4v4M16 4v4"/></svg><span>Payday</span></button>
      <button class="tab" data-screen="goals"><svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="m15 9 5-5"/></svg><span>Goals</span></button>
      <button class="tab" data-screen="settings"><svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.12 2.12-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.04 1.56V20h-3v-.08A1.7 1.7 0 0 0 10.66 18.36a1.7 1.7 0 0 0-1.88.34l-.06.06-2.12-2.12.06-.06A1.7 1.7 0 0 0 7 14.7a1.7 1.7 0 0 0-1.56-1.04H5v-3h.08A1.7 1.7 0 0 0 6.64 9.62 1.7 1.7 0 0 0 6.3 7.74l-.06-.06 2.12-2.12.06.06A1.7 1.7 0 0 0 10.3 6a1.7 1.7 0 0 0 1.04-1.56V4h3v.08A1.7 1.7 0 0 0 15.38 5.64a1.7 1.7 0 0 0 1.88-.34l.06-.06 2.12 2.12-.06.06A1.7 1.7 0 0 0 19 9.3a1.7 1.7 0 0 0 1.56 1.04H21v3h-.08A1.7 1.7 0 0 0 19.4 15Z"/></svg><span>Settings</span></button>
    </nav>
    <style>.tab{font-weight:700}.tab-icon{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.tab.active .tab-icon{stroke-width:2.2}.payday-tab .tab-icon{width:19px;height:19px}.tab span{font-size:.68rem}.payday-tab span,.payday-tab.active span{width:auto;height:auto;display:block;background:transparent;color:inherit;border-radius:0;font-weight:inherit}</style>

    <dialog id="entryDialog">
      <form method="dialog" id="entryForm">
<div class="modal-head"><h2 id="formTitle">Add transaction</h2><button class="plain" value="cancel" formnovalidate data-close-dialog="entryDialog" aria-label="Close">Ã—</button></div>
        <input type="hidden" id="entryType" value="transaction" />
        <label>Amount<input id="amount" inputmode="decimal" type="number" min="0.01" step="0.01" required placeholder="0.00" /></label>
        <label id="nameLabel">Merchant<input id="name" maxlength="50" required placeholder="Example: Chevron" /></label>
        <label id="categoryLabel">Category<select id="category"></select></label>
        <label id="dateLabel">Date<input id="entryDate" type="date" required /></label>
        <label id="notesLabel">Notes<input id="notes" maxlength="140" placeholder="Optional" /></label>
<div class="modal-actions"><button class="secondary" value="cancel" formnovalidate data-close-dialog="entryDialog">Cancel</button><button class="primary" id="saveEntry" value="default">Save</button></div>
      </form>
    </dialog>

    <dialog id="paydayDialog">
      <form method="dialog" id="paydayForm">
        <div class="modal-head"><h2>Log paycheck</h2><button class="plain" value="cancel" formnovalidate data-close-dialog="paydayDialog" aria-label="Close">Ã—</button></div>
        <p class="muted">Review the split before saving. You can change these percentages in Settings.</p>
        <label>Paycheck amount<input id="paycheckAmount" inputmode="decimal" type="number" min="0.01" step="0.01" required placeholder="0.00" /></label>
        <div id="allocationPreview" class="allocation-preview"></div>
        <div class="modal-actions"><button class="secondary" value="cancel" formnovalidate data-close-dialog="paydayDialog">Cancel</button><button class="primary" value="default">Log paycheck</button></div>
      </form>
    </dialog>

    <dialog id="goalDialog">
      <form method="dialog" id="goalForm">
        <div class="modal-head"><h2>New goal</h2><button class="plain" value="cancel" formnovalidate data-close-dialog="goalDialog" aria-label="Close">Ã—</button></div>
        <label>Goal name<input id="goalName" maxlength="50" required placeholder="Example: Car fund" /></label>
        <label>Target amount<input id="goalTarget" inputmode="decimal" type="number" min="1" step="0.01" required placeholder="5000" /></label>
        <label>Target date <span class="muted">(optional)</span><input id="goalDate" type="date" /></label>
        <div class="modal-actions"><button class="secondary" value="cancel" formnovalidate data-close-dialog="goalDialog">Cancel</button><button class="primary" value="default">Create goal</button></div>
      </form>
    </dialog>
    <dialog id="subscriptionDialog">
      <form method="dialog" id="subscriptionForm">
        <div class="modal-head"><h2>Add subscription</h2><button class="plain" value="cancel" formnovalidate data-close-dialog="subscriptionDialog" aria-label="Close">Ã—</button></div>
        <p class="muted">Money for subscriptions due before your next paycheck is reserved automatically.</p>
        <label>Subscription name<input id="subscriptionName" list="subscriptionPresetList" maxlength="50" required placeholder="Start typing: ChatGPT, Spotify, Uber..." /></label>
        <datalist id="subscriptionPresetList"></datalist>
        <label>Monthly cost<input id="subscriptionAmount" inputmode="decimal" type="number" min="0.01" step="0.01" required placeholder="0.00" /></label>
        <label>Day it charges each month<input id="subscriptionDay" inputmode="numeric" type="number" min="1" max="31" required placeholder="Example: 15" /></label>
        <div class="modal-actions"><button class="secondary" value="cancel" formnovalidate data-close-dialog="subscriptionDialog">Cancel</button><button class="primary" type="button" id="saveSubscription">Add subscription</button></div>
      </form>
    </dialog>
    <style>:root{--bg:#060817;--panel:#0f1630;--panel2:#172143;--line:#2a3a67;--text:#f4f7ff;--muted:#9aa9cc;--green:#72a5ff;--gold:#f0c36b;--red:#ff7d91}html{height:100%;overscroll-behavior:none}body{min-height:100dvh;overscroll-behavior-y:none;touch-action:pan-y;background:radial-gradient(circle at 50% -20%,#253b87 0,var(--bg) 44%)}.activity-icon{background:#1c2f68;color:#8ab5ff}.payday-tab.active .tab-icon{color:#8ab5ff}#transactions.active{max-height:calc(100dvh - 150px);overflow-y:auto;padding:0 2px 170px;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}#transactions.active::-webkit-scrollbar{display:none}.activity-main{min-width:0}.transaction-actions{display:flex;gap:12px;margin-top:8px}.subscription-actions{display:grid;justify-items:end;gap:6px}</style>
<script src="app.js?v=22"></script>
  </body>
</html>
